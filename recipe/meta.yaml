{% set name = "ISPC" %}
{% set version = "1.30.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ispc/ispc/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 73b30c74fdfc56c3097015476df14d0a4bcb6705d9e286c6d51c1ed578d49e22

build:
  number: 0
  skip: True  # [not linux]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - python *
    - cmake
    - make      # [unix]
    - flex      # [unix]
    - bison     # [unix]
    - m2-flex   # [win]
    - m2-bison  # [win]
    - m2-m4     # [win]
    - clang     {{ llvm_version }}.*  # [unix]
    - clangxx   {{ llvm_version }}.*  # [unix]
    - clangdev  {{ llvm_version }}.*
    - llvmdev   {{ llvm_version }}.*
  host:
    - clangdev  {{ llvm_version }}.*
    - llvmdev   {{ llvm_version }}.*
    - llvm      {{ llvm_version }}.*
    - ncurses   # [unix]
    - zlib

test:
  commands:
    - ispc --help

about:
  home: https://ispc.github.io/
  license: BSD-3-Clause
  license_file: LICENSE.txt
  summary: 'Intel SPMD Program Compiler'
  doc_url: https://ispc.github.io/documentation.html
  dev_url: https://github.com/ispc/ispc

extra:
  recipe-maintainers:
    - isuruf
